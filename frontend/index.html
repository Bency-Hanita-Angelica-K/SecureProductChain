<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Product Chain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Secure Product Chain</h1>

        <button onclick="connectWallet()">Connect MetaMask</button>

        <h2>Add Product</h2>

        <input type="text" id="productId" placeholder="Product ID">
        <input type="text" id="productName" placeholder="Product Name">
        <input type="text" id="manufacturer" placeholder="Manufacturer">

        <button onclick="addProduct()">Add Product</button>

        <hr>

        <h2>Verify Product</h2>

        <input type="text" id="verifyId" placeholder="Enter Product ID">

        <button onclick="verifyProduct()">Verify</button>

        <h3 id="result"></h3>
    </div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
